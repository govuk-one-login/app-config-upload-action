name: Test upload action
on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: test-upload-action-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  run-tests:
    name: Test upload action
    environment: development
    runs-on: ubuntu-latest

    steps:
      - name: Create test config file
        shell: bash
        id: test-config
        run: |
          mkdir -p config
          cat > config/test-config.yaml << EOF
          foo: "bar"
          commit: "${{ github.sha }}"
          EOF

      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          path: upload-action

      - name: Upload action
        uses: ./upload-action
        with:
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          config-file: test-config.yaml
          artefact-signing-key-arn: ${{ secrets.CONFIG_SIGNING_KEY_ARN }}
          config-source-bucket-name: ${{ secrets.APP_CONFIG_SOURCE_BUCKET_NAME }}
          environment: dev
