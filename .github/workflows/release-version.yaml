name: Tag and release new version

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  tag:
    name: Tag Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    outputs:
      release_tag: ${{ steps.next-release.outputs.NEXT_VERSION }}

